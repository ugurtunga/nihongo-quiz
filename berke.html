<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Japonca Flash Card</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--surf:#1e293b;--surf2:#273549;--border:#334155;
  --acc:#6366f1;--acc2:#818cf8;--acc-light:rgba(99,102,241,.15);
  --text:#f1f5f9;--muted:#94a3b8;--muted2:#64748b;
  --green:#22c55e;--red:#ef4444;
  --card-back:#312e81;--card-back-b:#1e1b4b;
  --r:14px;
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 env(safe-area-inset-bottom,0) 0;
  overflow-x:hidden;
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:50;width:100%;
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:10px 16px 0;
}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:700;color:var(--acc2);flex:1}
.hdr-count{font-size:11px;color:var(--muted);white-space:nowrap}

/* ── FİLTRELER ── */
.filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;
  scrollbar-width:none;-ms-overflow-style:none}
.filters::-webkit-scrollbar{display:none}
.flt{white-space:nowrap;padding:5px 12px;border-radius:18px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .2s;-webkit-appearance:none}
.flt.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}

/* ── CONTENT ── */
.wrap{width:100%;max-width:520px;padding:16px 16px 30px;display:flex;flex-direction:column;align-items:center;gap:0}

/* ── STATS ── */
.stats{display:flex;gap:0;margin-bottom:14px;background:var(--surf);
  border-radius:12px;border:1px solid var(--border);overflow:hidden;width:100%}
.stat{flex:1;text-align:center;padding:10px 6px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sv{font-size:20px;font-weight:700;color:var(--acc2);line-height:1}
.sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.sv.g{color:var(--green)}.sv.r{color:var(--red)}

/* ── PROGRESS ── */
.prog-wrap{width:100%;margin-bottom:18px}
.prog-track{height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));
  border-radius:3px;transition:width .4s}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

/* ── FLASH CARD ── */
.scene{width:100%;max-width:400px;height:240px;perspective:900px;
  cursor:pointer;margin-bottom:18px;user-select:none}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  padding:28px 20px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.front{background:linear-gradient(145deg,var(--surf),var(--surf2));border:1px solid var(--border)}
.back{background:linear-gradient(145deg,var(--card-back),var(--card-back-b));
  transform:rotateY(180deg);border:1px solid #4338ca}
.c-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.c-jp{font-size:48px;line-height:1.2;color:#fff;text-align:center;margin-bottom:8px;
  text-shadow:0 0 30px rgba(99,102,241,.3)}
.c-jp.sm{font-size:30px}.c-jp.xs{font-size:22px}
.c-rom{font-size:16px;color:var(--acc2);font-style:italic}
.c-tr{font-size:26px;font-weight:600;color:#fff;text-align:center;
  line-height:1.3;margin-bottom:8px}
.c-tr.sm{font-size:20px}.c-tr.xs{font-size:16px}
.c-hint{font-size:13px;color:#a5b4fc;font-style:italic}
.flip-tip{position:absolute;bottom:12px;right:14px;font-size:10px;
  color:var(--muted2);display:flex;align-items:center;gap:3px}

/* ── CEVAP BUTONLARI ── */
.ans-row{display:flex;gap:10px;margin-bottom:16px;width:100%;max-width:400px}
.ans{flex:1;padding:13px;border-radius:12px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .2s,transform .2s}
.ans.vis{opacity:1;pointer-events:all;transform:translateY(0)}
.ans.knew{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.ans.knew:active{background:rgba(34,197,94,.3)}
.ans.didnt{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.ans.didnt:active{background:rgba(239,68,68,.3)}

/* ── NAVİGASYON ── */
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nav-btn{width:44px;height:44px;border-radius:11px;border:1px solid var(--border);
  background:var(--surf);color:var(--text);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:active{background:var(--surf2)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.ctr{font-size:13px;color:var(--muted);min-width:72px;text-align:center}

/* ── OPSİYONLAR ── */
.opts{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;width:100%}
.opt{padding:7px 13px;border-radius:9px;border:1px solid var(--border);
  background:var(--surf);color:var(--muted);font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all .15s;-webkit-appearance:none}
.opt:active,.opt.on{background:var(--acc-light);border-color:var(--acc);color:var(--acc2)}
.opt svg{width:13px;height:13px;flex-shrink:0}

/* ── ÇİZİM ALANI ── */
.draw-sec{width:100%;max-width:400px;margin-bottom:10px}
.draw-tog{display:flex;align-items:center;gap:6px;padding:7px 2px;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);
  background:none;border:none;width:100%;text-align:left;-webkit-appearance:none}
.draw-tog svg{transition:transform .2s}
.draw-tog.open svg.arr{transform:rotate(180deg)}
.draw-body{display:none;margin-top:6px}
.draw-body.open{display:block}
.draw-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.draw-toolbar span{font-size:11px;color:var(--muted)}
.sz-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);
  background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .15s;-webkit-appearance:none}
.sz-btn.on,.sz-btn:active{border-color:var(--acc)}
.sz-dot{background:#fff;border-radius:50%;pointer-events:none}
.draw-canvas-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--border);
  background:#fff;touch-action:none;cursor:crosshair;position:relative}
#drawCanvas{display:block;width:100%;height:190px}
.draw-footer{display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap}
.draw-ac{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer}
.draw-ac input{accent-color:var(--acc)}
.clr-btn{margin-left:auto;padding:5px 11px;border-radius:7px;
  border:1px solid var(--border);background:var(--surf);
  color:var(--muted);font-size:12px;cursor:pointer;-webkit-appearance:none}
.clr-btn:active{border-color:var(--red);color:var(--red)}

/* ── KS HİNT ── */
.kb-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  font-size:11px;color:var(--muted2);margin-top:4px}
.key{background:var(--surf2);border:1px solid var(--border);border-radius:4px;
  padding:1px 6px;font-family:monospace;font-size:10px;color:var(--muted)}

/* ── RESULT ── */
.result-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
.result-box{background:var(--surf);border-radius:20px;padding:32px 28px;
  width:100%;max-width:360px;text-align:center;border:1px solid var(--border)}
.r-emoji{font-size:52px;margin-bottom:10px}
.r-title{font-size:20px;font-weight:700;margin-bottom:4px}
.r-score{font-size:44px;font-weight:700;color:var(--acc2);margin:10px 0}
.r-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.7}
.r-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.rbtn{padding:11px 20px;border-radius:10px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.rbtn.p{background:var(--acc);color:#fff}
.rbtn.s{background:var(--surf2);color:var(--text);border:1px solid var(--border)}

/* ── ANİMASYONLAR ── */
@keyframes pop{0%{transform:scale(.96)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pop{animation:pop .25s ease}
.shake{animation:shake .28s ease}

/* ── RESPONSİVE ── */
@media(max-width:380px){
  .scene{height:210px}
  .c-jp{font-size:40px}.c-tr{font-size:22px}
  .stats .sv{font-size:17px}
}
@media(min-width:600px){
  .wrap{padding:20px 20px 40px}
  .scene{height:260px;max-width:440px}
  .c-jp{font-size:54px}.c-tr{font-size:28px}
  .ans-row,.nav-row{max-width:440px}
}
@media(min-width:900px){
  .scene{height:280px;max-width:460px}
  .c-jp{font-size:58px}
  .wrap{padding:24px 24px 50px}
}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <h1>🇯🇵 Japonca Flash Card</h1>
    <span class="hdr-count" id="hdrCount">198 kelime</span>
  </div>
  <div class="filters" id="filterBar"></div>
</header>

<div class="wrap">

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="sv" id="sTotal">0</div><div class="sl">Toplam</div></div>
    <div class="stat"><div class="sv g" id="sKnew">0</div><div class="sl">Bildim</div></div>
    <div class="stat"><div class="sv r" id="sDidnt">0</div><div class="sl">Bilmedim</div></div>
    <div class="stat"><div class="sv" id="sLeft">0</div><div class="sl">Kalan</div></div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-row"><span id="progL">0 / 0</span><span id="progP">0%</span></div>
  </div>

  <!-- CARD -->
  <div class="scene" id="scene">
    <div class="card-inner" id="cardInner">
      <div class="face front">
        <div class="c-lbl" id="frontLbl">Japonca</div>
        <div class="c-jp"  id="cJp">あ</div>
        <div class="c-rom" id="cRom"></div>
        <div class="flip-tip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          dokun / çevir
        </div>
      </div>
      <div class="face back">
        <div class="c-lbl" id="backLbl">Türkçe Anlam</div>
        <div class="c-tr"  id="cTr"></div>
        <div class="c-hint" id="cHint"></div>
        <div class="flip-tip" style="color:rgba(255,255,255,.3)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          tekrar çevir
        </div>
      </div>
    </div>
  </div>

  <!-- CEVAP BUTONLARI -->
  <div class="ans-row">
    <button class="ans didnt" id="btnDidnt" onclick="answer(false)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Bilmedim
    </button>
    <button class="ans knew" id="btnKnew" onclick="answer(true)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Bildim
    </button>
  </div>

  <!-- NAVİGASYON -->
  <div class="nav-row">
    <button class="nav-btn" id="btnPrev" onclick="go(-1)">‹</button>
    <span class="ctr" id="ctr">1 / 198</span>
    <button class="nav-btn" id="btnNext" onclick="go(1)">›</button>
  </div>

  <!-- OPSİYONLAR -->
  <div class="opts">
    <button class="opt on" id="optShuffle" onclick="toggle('shuffle')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      Karıştır
    </button>
    <button class="opt" id="optStudy" onclick="toggle('study')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Bilmediklerim
    </button>
    <button class="opt" id="optFlip" onclick="toggle('flip')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      TR → JP
    </button>
    <button class="opt" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
      </svg>
      Sıfırla
    </button>
  </div>

  <!-- ÇİZİM ALANI -->
  <div class="draw-sec">
    <button class="draw-tog" id="drawTog" onclick="toggleDraw()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Yazma Alanı
      <svg class="arr" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="draw-body" id="drawBody">
      <div class="draw-toolbar">
        <span>Kalınlık:</span>
        <button class="sz-btn"    data-s="2"  onclick="setSize(2,this)"><span class="sz-dot" style="width:3px;height:3px"></span></button>
        <button class="sz-btn on" data-s="5"  onclick="setSize(5,this)"><span class="sz-dot" style="width:7px;height:7px"></span></button>
        <button class="sz-btn"    data-s="10" onclick="setSize(10,this)"><span class="sz-dot" style="width:12px;height:12px"></span></button>
        <button class="sz-btn"    data-s="18" onclick="setSize(18,this)"><span class="sz-dot" style="width:16px;height:16px"></span></button>
      </div>
      <div class="draw-canvas-wrap" id="canvasWrap">
        <canvas id="drawCanvas"></canvas>
      </div>
      <div class="draw-footer">
        <label class="draw-ac"><input type="checkbox" id="chkAC" checked>Otomatik temizle</label>
        <button class="clr-btn" onclick="clearDraw()">Temizle</button>
      </div>
    </div>
  </div>

  <!-- KLAVYE HINTS (sadece geniş ekranda) -->
  <div class="kb-row" id="kbRow" style="display:none">
    <span><span class="key">Space</span> Çevir</span>
    <span><span class="key">← →</span> Gezin</span>
    <span><span class="key">1</span> Bilmedim &nbsp;<span class="key">2</span> Bildim</span>
  </div>

</div><!-- /wrap -->

<script>
/* ══════════════════════════════
   VERİ — Apps Script üzerinden çekilir
══════════════════════════════ */
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwW9pcHYv-gGBgZtToE78CGYJfKpztqj8al-_0r5A8D39Nw5AbEl447kM69qWmySV-8/exec';
const SCRIPT_KEY='sango2026gizli';
let DATA = [];

async function loadFromSheets(){
  document.getElementById('hdrCount').textContent='Yükleniyor...';
  try{
    const resp=await fetch(SCRIPT_URL+'?key='+SCRIPT_KEY);
    const data=await resp.json();
    if(data.error) throw new Error(data.error);
    const words=[];
    data.forEach(w=>{
      const dt=(w.dt||'').toString().trim();
      const jp=(w.jp||'').toString().trim();
      const rm=(w.rm||'').toString().trim();
      const tr=(w.tr||'').toString().trim();
      if(jp&&rm&&tr) words.push([dt, jp, rm, tr]);
    });
    if(words.length>0){
      DATA=words;
      localStorage.setItem('berke_words_cache',JSON.stringify(DATA));
      return true;
    } else throw new Error('Kelime bulunamadı');
  }catch(e){
    console.error(e);
    const cached=localStorage.getItem('berke_words_cache');
    if(cached){ DATA=JSON.parse(cached); return true; }
    document.getElementById('hdrCount').textContent='Yüklenemedi!';
    return false;
  }
}

/* ══════════════════════════════
   STATE
══════════════════════════════ */
const S = {
  deck:[], pos:0, flipped:false,
  knew:new Set(), didnt:new Set(),
  shuffle:true, study:false, flip:false,
  filter:'all',
};

const LS = 'jfc2';
function save(){ try{ localStorage.setItem(LS,JSON.stringify({knew:[...S.knew],didnt:[...S.didnt]})); }catch{} }
function load(){ try{ const d=JSON.parse(localStorage.getItem(LS)||'{}'); S.knew=new Set(d.knew||[]); S.didnt=new Set(d.didnt||[]); }catch{} }

/* ══════════════════════════════
   DECK
══════════════════════════════ */
function buildDeck(){
  let idx = DATA.map((_,i)=>i);
  if(S.filter!=='all') idx = idx.filter(i=>DATA[i][0]===S.filter);
  if(S.study){ const u=idx.filter(i=>!S.knew.has(i)); if(u.length) idx=u; }
  if(S.shuffle){ for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]; } }
  S.deck=idx; S.pos=0;
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function render(){
  if(!S.deck.length) return;
  const w   = DATA[S.deck[S.pos]];
  const jp  = w[1], rom = w[2], tr = w[3];
  const len = jp.length;

  // font boyutu
  const jpEl  = document.getElementById('cJp');
  const trEl  = document.getElementById('cTr');
  jpEl.className = 'c-jp'+(len>6?' xs':len>4?' sm':'');
  trEl.className = 'c-tr'+(tr.length>12?' xs':tr.length>8?' sm':'');

  if(!S.flip){
    document.getElementById('frontLbl').textContent='Japonca';
    document.getElementById('backLbl').textContent='Türkçe Anlam';
    jpEl.textContent  = jp;
    document.getElementById('cRom').textContent = rom;
    trEl.textContent  = tr;
    document.getElementById('cHint').textContent = rom;
  } else {
    document.getElementById('frontLbl').textContent='Türkçe';
    document.getElementById('backLbl').textContent='Japonca';
    jpEl.textContent  = tr;
    document.getElementById('cRom').textContent = '';
    trEl.textContent  = jp;
    document.getElementById('cHint').textContent = rom;
  }

  document.getElementById('ctr').textContent = `${S.pos+1} / ${S.deck.length}`;
  document.getElementById('btnPrev').disabled = S.pos===0;
  document.getElementById('btnNext').disabled = S.pos===S.deck.length-1;
  document.getElementById('hdrCount').textContent = `${S.deck.length} / ${DATA.length} kelime`;

  // kart yüzü
  document.getElementById('cardInner').classList.toggle('flipped', S.flipped);
  showAns(S.flipped);
  updateStats();
}

function showAns(v){
  document.getElementById('btnKnew').classList.toggle('vis',v);
  document.getElementById('btnDidnt').classList.toggle('vis',v);
}

function updateStats(){
  const total = S.deck.length;
  const kn    = S.deck.filter(i=>S.knew.has(i)).length;
  const dn    = S.deck.filter(i=>S.didnt.has(i)).length;
  const done  = kn+dn, left=total-done;
  const pct   = total?Math.round(done/total*100):0;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sKnew').textContent  = kn;
  document.getElementById('sDidnt').textContent = dn;
  document.getElementById('sLeft').textContent  = left;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progL').textContent  = `${done} / ${total}`;
  document.getElementById('progP').textContent  = pct+'%';
}

/* ══════════════════════════════
   EYLEMLER
══════════════════════════════ */
function flip(){
  S.flipped = !S.flipped;
  document.getElementById('cardInner').classList.toggle('flipped', S.flipped);
  showAns(S.flipped);
}

function go(dir){
  const npos = S.pos + dir;
  if(npos<0 || npos>=S.deck.length) return;
  autoClear();
  S.pos = npos; S.flipped = false;
  render();
  anim('pop');
}

function answer(knew){
  const i = S.deck[S.pos];
  if(knew){ S.knew.add(i); S.didnt.delete(i); anim('pop'); }
  else     { S.didnt.add(i); S.knew.delete(i); anim('shake'); }
  save();

  S.flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  showAns(false);

  setTimeout(()=>{
    if(S.pos < S.deck.length-1){ autoClear(); S.pos++; render(); }
    else showResult();
  }, 270);
}

function anim(cls){
  const s = document.getElementById('scene');
  s.classList.remove('pop','shake');
  requestAnimationFrame(()=>{ s.classList.add(cls); s.addEventListener('animationend',()=>s.classList.remove(cls),{once:true}); });
}

/* ══════════════════════════════
   OPSİYON TOGGLES
══════════════════════════════ */
function toggle(key){
  S[key] = !S[key];
  document.getElementById('opt'+key.charAt(0).toUpperCase()+key.slice(1)).classList.toggle('on', S[key]);
  S.flipped = false; buildDeck(); render();
}

function resetAll(){
  if(!confirm('Tüm ilerleme sıfırlansın mı?')) return;
  S.knew.clear(); S.didnt.clear(); save();
  S.flipped = false; buildDeck(); render();
}

/* ══════════════════════════════
   FİLTRE BAR
══════════════════════════════ */
function buildFilters(){
  const dates = [...new Set(DATA.map(r=>r[0]).filter(d=>d&&d.length>0))].sort((a,b)=>{
    const p=s=>{ const[d,m,y]=s.split('.').map(Number); return new Date(y,m-1,d); };
    return p(a)-p(b);
  });
  const bar = document.getElementById('filterBar');
  bar.innerHTML='';
  const mk=(lbl,val)=>{
    const b=document.createElement('button');
    b.className='flt'+(val===S.filter?' on':'');
    b.textContent=lbl;
    b.onclick=()=>{ S.filter=val; S.flipped=false; document.querySelectorAll('.flt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); buildDeck(); render(); };
    bar.appendChild(b);
  };
  mk(`Tümü (${DATA.length})`,'all');
  dates.forEach((d,i)=>{ const cnt=DATA.filter(r=>r[0]===d).length; mk(`${i+1}. Ders · ${d} (${cnt})`,d); });
}

/* ══════════════════════════════
   SONUÇ
══════════════════════════════ */
function showResult(){
  const total = S.deck.length;
  const kn    = S.deck.filter(i=>S.knew.has(i)).length;
  const pct   = Math.round(kn/total*100);
  const emoji = pct>=80?'🎉':pct>=50?'👍':'💪';
  const msg   = pct>=80?'Harika gidiyorsun!':pct>=50?'İyi iş, devam et!':'Her tekrar öğretir!';

  const ov=document.createElement('div'); ov.className='result-ov';
  ov.innerHTML=`<div class="result-box">
    <div class="r-emoji">${emoji}</div>
    <div class="r-title">Tur Tamamlandı!</div>
    <div class="r-score">${pct}%</div>
    <div class="r-sub"><strong>${kn}</strong> bildim &nbsp;·&nbsp; <strong>${total-kn}</strong> bilmedim<br>${msg}</div>
    <div class="r-btns">
      <button class="rbtn p" id="rAll">Baştan Çalış</button>
      <button class="rbtn s" id="rUnk">Sadece Bilmediklerim</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#rAll').onclick=()=>{ ov.remove(); S.flipped=false; buildDeck(); render(); };
  ov.querySelector('#rUnk').onclick=()=>{ ov.remove(); S.study=true; document.getElementById('optStudy').classList.add('on'); S.flipped=false; buildDeck(); render(); };
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}

/* ══════════════════════════════
   ÇİZİM
══════════════════════════════ */
let dCtx=null, dSize=5, drawing=false, lx=0, ly=0;

function toggleDraw(){
  const body=document.getElementById('drawBody');
  const tog=document.getElementById('drawTog');
  const open=body.classList.toggle('open');
  tog.classList.toggle('open',open);
  if(open) initCanvas();
}

function initCanvas(){
  const canvas=document.getElementById('drawCanvas');
  const wrap=document.getElementById('canvasWrap');
  if(dCtx) return; // zaten init edildi
  const dpr=window.devicePixelRatio||1;
  const w=wrap.clientWidth, h=190;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  dCtx=canvas.getContext('2d');
  dCtx.scale(dpr,dpr);
  dCtx.fillStyle='#fff'; dCtx.fillRect(0,0,w,h);
  dCtx.lineCap='round'; dCtx.lineJoin='round';

  const pos=e=>{ const r=canvas.getBoundingClientRect(); return{x:e.clientX-r.left,y:e.clientY-r.top}; };
  const pressure=e=> e.pointerType==='pen'&&e.pressure>0 ? e.pressure : 0.5;

  canvas.addEventListener('pointerdown',e=>{
    e.preventDefault(); drawing=true; canvas.setPointerCapture(e.pointerId);
    const{x,y}=pos(e); lx=x; ly=y;
    const sz=dSize*(0.4+pressure(e));
    dCtx.beginPath(); dCtx.arc(x,y,sz/2,0,Math.PI*2);
    dCtx.fillStyle='#1e293b'; dCtx.fill();
  },{passive:false});

  canvas.addEventListener('pointermove',e=>{
    if(!drawing) return; e.preventDefault();
    const{x,y}=pos(e);
    dCtx.beginPath(); dCtx.moveTo(lx,ly); dCtx.lineTo(x,y);
    dCtx.lineWidth=dSize*(0.4+pressure(e));
    dCtx.strokeStyle='#1e293b'; dCtx.stroke();
    lx=x; ly=y;
  },{passive:false});

  const stop=()=>drawing=false;
  canvas.addEventListener('pointerup',stop);
  canvas.addEventListener('pointercancel',stop);
  canvas.addEventListener('pointerout',stop);
}

function setSize(s,btn){
  dSize=s;
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function clearDraw(){
  if(!dCtx) return;
  const c=document.getElementById('drawCanvas');
  const dpr=window.devicePixelRatio||1;
  dCtx.fillStyle='#fff'; dCtx.fillRect(0,0,c.width/dpr,c.height/dpr);
}

function autoClear(){
  if(document.getElementById('chkAC')?.checked) clearDraw();
}

/* ══════════════════════════════
   SWIPE (dokunmatik)
══════════════════════════════ */
let tx0=0, ty0=0;
const scene=document.getElementById('scene');
scene.addEventListener('touchstart',e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; },{passive:true});
scene.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
    dx<0 ? go(1) : go(-1);
  } else if(Math.abs(dx)<10 && Math.abs(dy)<10){
    flip();
  }
},{passive:true});

// Mouse click (PC)
scene.addEventListener('click',()=>{ flip(); });

/* ══════════════════════════════
   KLAVYE
══════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); flip(); }
  else if(e.key==='ArrowRight') go(1);
  else if(e.key==='ArrowLeft')  go(-1);
  else if(e.key==='2'){ if(S.flipped) answer(true); }
  else if(e.key==='1'){ if(S.flipped) answer(false); }
});

/* ══════════════════════════════
   INIT
══════════════════════════════ */
if(window.innerWidth>=768) document.getElementById('kbRow').style.display='flex';

async function init(){
  await loadFromSheets();
  if(DATA.length===0) return;
  document.getElementById('hdrCount').textContent=DATA.length+' kelime';
  load();
  buildFilters();
  buildDeck();
  render();
}
init();
</script>
